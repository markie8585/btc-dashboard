<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto App PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: -apple-system, sans-serif;
    background: #020617;
    color: white;
    margin: 0;
}

/* SCREENS */
.screen { display:none; padding:20px; }
.active { display:block; }

/* HEADER */
.header {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #f7931a;
}

/* CARD */
.card {
    background: rgba(30,41,59,0.6);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 10px;
    border: none;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #f7931a;
}

/* NAV */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #020617;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}

.green { color:#22c55e; }
.red { color:#ef4444; }
.big { font-size:28px; }

</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="screen active">
    <div class="header">🚀 Dashboard</div>

    <div class="card">
        Portfolio
        <div id="total" class="big"></div>
    </div>

    <div class="card">
        Winst
        <div id="profit"></div>
    </div>

    <div class="card"><canvas id="pie"></canvas></div>
    <div class="card"><canvas id="btcChart"></canvas></div>

    <div class="card">
        🤖 AI
        <div id="ai"></div>
    </div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="screen">
    <div class="header">💼 Portfolio</div>

    <div id="inputs"></div>

    <button onclick="savePortfolio()">💾 Opslaan</button>
</div>

<!-- ALERTS -->
<div id="alertsScreen" class="screen">
    <div class="header">🔔 Alerts</div>
    <div id="alerts"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
    <div class="header">⚙️ Settings</div>

    <div class="card">
        Startkapitaal
        <input id="startInput" value="15000">
    </div>
</div>

<!-- NAV -->
<div class="nav">
    <button onclick="show('dashboard')">Home</button>
    <button onclick="show('portfolio')">Portfolio</button>
    <button onclick="show('alertsScreen')">Alerts</button>
    <button onclick="show('settings')">Settings</button>
</div>

<script>

function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// 💾 load portfolio
let portfolio = JSON.parse(localStorage.getItem("portfolio")) || {
    btc:0.135, sol:23, akt:1400, rio:13000, atom:201, inj:105
};

// inputs maken
function renderInputs(){
    let html="";
    for(let c in portfolio){
        html += c.toUpperCase()+"<input id='"+c+"' value='"+portfolio[c]+"'>";
    }
    document.getElementById("inputs").innerHTML = html;
}
renderInputs();

function savePortfolio(){
    for(let c in portfolio){
        portfolio[c] = parseFloat(document.getElementById(c).value);
    }
    localStorage.setItem("portfolio", JSON.stringify(portfolio));
    alert("Opgeslagen!");
}

let pieChart, btcChart;

async function load(){

    let start = document.getElementById("startInput").value;

    let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,solana,akash-network,realio-network,cosmos,injective-protocol&vs_currencies=usd");
    let data = await res.json();

    let prices = {
        btc:data.bitcoin.usd,
        sol:data.solana.usd,
        akt:data["akash-network"].usd,
        rio:data["realio-network"].usd,
        atom:data.cosmos.usd,
        inj:data["injective-protocol"].usd
    };

    let values={}, total=0;

    for(let c in portfolio){
        values[c]=portfolio[c]*prices[c];
        total+=values[c];
    }

    document.getElementById("total").innerHTML="$"+total.toFixed(0);

    let profit = total-start;

    document.getElementById("profit").innerHTML =
        profit>=0?"<span class='green'>$"+profit.toFixed(0)+"</span>"
                  :"<span class='red'>$"+profit.toFixed(0)+"</span>";

    let labels=[], chartData=[];

    for(let c in values){
        labels.push(c.toUpperCase());
        chartData.push(values[c]);
    }

    if(pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById("pie"), {
        type:'doughnut',
        data:{labels:labels,datasets:[{data:chartData}]}
    });

    let hist = await fetch("https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=7");
    let histData = await hist.json();

    let pricesHist = histData.prices.map(p=>p[1]);

    if(btcChart) btcChart.destroy();
    btcChart = new Chart(document.getElementById("btcChart"), {
        type:'line',
        data:{labels:pricesHist.map((_,i)=>i),datasets:[{data:pricesHist}]}
    });

    let alerts="";
    let btcPct=(values.btc/total)*100;

    if(prices.btc<60000) alerts+="🟢 BUY BTC<br>";
    if(btcPct>70) alerts+="💰 TAKE PROFIT<br>";
    if(alerts==="") alerts="⏳ STABLE";

    document.getElementById("alerts").innerHTML=alerts;

    let ai="";
    if(btcPct<50) ai="BUY MODE";
    else if(btcPct>70) ai="SELL MODE";
    else ai="HOLD";

    document.getElementById("ai").innerHTML=ai;
}

load();
setInterval(load,60000);

</script>

</body>
</html>
