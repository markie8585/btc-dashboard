<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin: 15px auto;
    max-width: 400px;
}
h1 { color: #f7931a; }
</style>

</head>
<body>

<h1>🚀 Crypto Dashboard</h1>

<div class="card"><div id="total">Loading...</div></div>
<div class="card"><div id="btc"></div></div>
<div class="card"><div id="sol"></div></div>
<div class="card"><div id="akt"></div></div>
<div class="card"><div id="rio"></div></div>
<div class="card"><div id="atom"></div></div>
<div class="card"><div id="inj"></div></div>

<script>

let portfolio = {
    btc: 0.135,
    sol: 23,
    akt: 1400,
    rio: 13000,
    atom: 201,
    inj: 105
};

async function load() {

    try {

        let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,solana,akash-network,realio-network,cosmos,injective-protocol&vs_currencies=usd");
        let data = await res.json();

        let prices = {
            btc: data.bitcoin.usd,
            sol: data.solana.usd,
            akt: data["akash-network"].usd,
            rio: data["realio-network"].usd,
            atom: data.cosmos.usd,
            inj: data["injective-protocol"].usd
        };

        let total = 0;

        for (let c in portfolio) {
            total += portfolio[c] * prices[c];
        }

        document.getElementById("total").innerHTML = "$" + total.toFixed(2);
        document.getElementById("btc").innerHTML = "BTC: $" + prices.btc;
        document.getElementById("sol").innerHTML = "SOL: $" + prices.sol;
        document.getElementById("akt").innerHTML = "AKT: $" + prices.akt;
        document.getElementById("rio").innerHTML = "RIO: $" + prices.rio;
        document.getElementById("atom").innerHTML = "ATOM: $" + prices.atom;
        document.getElementById("inj").innerHTML = "INJ: $" + prices.inj;

    } catch (e) {
        document.body.innerHTML = "❌ Fout in script";
        console.error(e);
    }

}

load();

</script>

</body>
</html>
